<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bridge 2026 — Coach Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-md);
    }
    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: var(--space-xl);
      width: 100%;
      max-width: 380px;
    }
    .login-card h1 {
      font-size: var(--text-xl);
      margin-bottom: var(--space-xs);
    }
    .login-card p {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      margin-bottom: var(--space-lg);
    }
    .login-card label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      margin-bottom: var(--space-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .login-card input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: var(--text-sm);
      margin-bottom: var(--space-md);
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-card input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-muted);
      outline: none;
    }
    .login-card .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      background: var(--gradient-primary);
      color: white;
      transition: opacity 0.2s;
    }
    .login-card .btn:hover {
      opacity: 0.9;
    }
    .error-msg {
      background: var(--color-offline-muted);
      color: var(--color-offline);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: var(--text-xs);
      margin-bottom: var(--space-md);
    }
    .login-footer {
      text-align: center;
      margin-top: var(--space-lg);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Coach Login</h1>
    <p>Sign in to access the Bridge 2026 dashboard</p>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="coach@bridge2026.org" autocomplete="email" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password…" autocomplete="current-password" required>

      <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="login-footer">
      Bridge 2026 VII &middot; Coach Dashboard
    </div>
  </div>
</body>
</html>
