<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge 2026 - Create Poll</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">🌉 Bridge 2026</div>
            <nav class="nav-links">
                <a href="/" class="nav-link">📊 Dashboard</a>
                <a href="#" class="nav-link active">✏️ Create Poll</a>
            </nav>
            <div class="sidebar-bottom">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span>
                    <span style="font-size:0.8125rem;">Theme</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="section-title">✏️ Create a Poll</h1>

            <div class="panel-grid" style="max-width:700px;">
                <div class="card">
                    <h3 class="card-title">New Poll</h3>
                    <form id="poll-form">
                        <div style="display:flex;flex-direction:column;gap:12px;">
                            <div>
                                <label for="question" style="display:block;margin-bottom:6px;font-weight:600;color:var(--color-text);">Poll Question</label>
                                <textarea id="question" class="search-input" placeholder="What would you like to ask the community?" required style="min-height:80px;resize:vertical;"></textarea>
                            </div>

                            <div>
                                <label style="display:block;margin-bottom:6px;font-weight:600;color:var(--color-text);">Poll Options (2-5 required)</label>
                                <div id="options-list" style="display:flex;flex-direction:column;gap:8px;"></div>
                                <button type="button" id="add-option-btn" class="btn btn-secondary" style="width:100%;margin-top:8px;">+ Add Option</button>
                                <div style="font-size:0.8rem;color:var(--color-text-muted);margin-top:4px;">
                                    <span id="option-count">0</span> options (max 5)
                                </div>
                            </div>

                            <div style="display:flex;gap:12px;margin-top:12px;">
                                <button type="submit" class="btn btn-primary">Create Poll</button>
                                <button type="reset" class="btn btn-secondary">Clear</button>
                            </div>
                        </div>
                    </form>
                    <div id="response-message" style="margin-top:12px;padding:12px;border-radius:8px;display:none;"></div>
                    <div id="loading" style="display:none;text-align:center;color:var(--color-primary);margin-top:12px;">Creating poll...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script>
        const MAX_OPTIONS = 5;
        const MIN_OPTIONS = 2;

        function updateOptionCount() {
            const count = document.querySelectorAll('.option-item').length;
            document.getElementById('option-count').textContent = count;
            document.getElementById('add-option-btn').disabled = count >= MAX_OPTIONS;
        }

        function addOption(value) {
            if (value === undefined) value = '';
            const container = document.getElementById('options-list');
            const index = container.children.length;
            if (index >= MAX_OPTIONS) return;
            const div = document.createElement('div');
            div.className = 'option-item';
            div.style.cssText = 'display:flex;gap:10px;margin-bottom:8px;align-items:center;';
            div.innerHTML = '<input type="text" class="option-input" placeholder="Option ' + (index + 1) + '" value="' + value + '" required style="flex:1;"><button type="button" class="btn btn-secondary" style="padding:8px 10px;font-size:0.85rem;" onclick="this.parentElement.remove();updateOptionCount()">✕</button>';
            container.appendChild(div);
            updateOptionCount();
        }

        function showMessage(msg, isError) {
            const el = document.getElementById('response-message');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.backgroundColor = isError ? 'rgba(239,68,68,0.15)' : 'rgba(34,197,94,0.15)';
            el.style.color = isError ? '#ef4444' : '#22c55e';
            el.style.border = isError ? '1px solid #ef4444' : '1px solid #22c55e';
            if (!isError) {
                setTimeout(function() { el.style.display = 'none'; }, 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            addOption(); addOption();

            document.getElementById('add-option-btn').addEventListener('click', function(e) {
                e.preventDefault(); addOption();
            });

            document.getElementById('poll-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const question = document.getElementById('question').value.trim();
                const inputs = document.querySelectorAll('.option-input');
                const options = Array.from(inputs).map(function(i) { return i.value.trim(); }).filter(Boolean);

                if (!question) { showMessage('Please enter a question', true); return; }
                if (options.length < MIN_OPTIONS) { showMessage('Please provide at least ' + MIN_OPTIONS + ' options', true); return; }

                document.getElementById('loading').style.display = 'block';

                try {
                    const r = await fetch('/api/polls/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question: question, options: options })
                    });
                    document.getElementById('loading').style.display = 'none';
                    const data = await r.json();
                    if (r.ok) {
                        showMessage('✅ Poll created successfully!');
                        document.getElementById('poll-form').reset();
                        document.getElementById('options-list').innerHTML = '';
                        addOption(); addOption();
                    } else {
                        showMessage('❌ Error: ' + (data.error || 'Unknown error'), true);
                    }
                } catch (err) {
                    document.getElementById('loading').style.display = 'none';
                    showMessage('❌ Network error: ' + err.message, true);
                }
            });
        });
    </script>
</body>
</html>
