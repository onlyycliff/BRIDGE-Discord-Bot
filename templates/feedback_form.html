<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bridge 2026 — Tour Feedback</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .feedback-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-md);
    }
    .feedback-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: var(--space-xl);
      width: 100%;
      max-width: 480px;
    }
    .feedback-card h1 {
      font-size: var(--text-xl);
      margin-bottom: var(--space-xs);
    }
    .feedback-card .tour-meta {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      margin-bottom: var(--space-lg);
    }
    .feedback-card label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      margin-bottom: var(--space-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .feedback-card input,
    .feedback-card textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: var(--text-sm);
      margin-bottom: var(--space-md);
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
      font-family: inherit;
    }
    .feedback-card input:focus,
    .feedback-card textarea:focus {
      border-color: var(--color-primary);
    }
    .feedback-card textarea {
      min-height: 100px;
      resize: vertical;
    }
    .star-rating {
      display: flex;
      gap: 8px;
      margin-bottom: var(--space-md);
      direction: rtl;
    }
    .star-rating input {
      display: none;
    }
    .star-rating label {
      font-size: 2rem;
      color: var(--color-border);
      cursor: pointer;
      transition: color 0.2s;
      text-transform: none;
      letter-spacing: normal;
    }
    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
      color: #F59E0B;
    }
    .feedback-card .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      background: var(--gradient-primary);
      color: white;
      transition: opacity 0.2s;
    }
    .feedback-card .btn:hover {
      opacity: 0.9;
    }
    .success-msg {
      background: var(--color-online-muted);
      color: var(--color-online);
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-size: var(--text-sm);
      margin-bottom: var(--space-md);
    }
    .hidden {
      display: none;
    }
    .feedback-footer {
      text-align: center;
      margin-top: var(--space-lg);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .required::after {
      content: " *";
      color: var(--color-offline);
    }
  </style>
</head>
<body class="feedback-page">
  <div class="feedback-card">
    <h1>Tour Feedback</h1>
    <div class="tour-meta">
      {{ tour.name }} &middot; {{ tour.company }}
      {% if tour.date %}<br>{{ tour.date.strftime('%B %d, %Y') }}{% endif %}
    </div>

    <div id="success-msg" class="success-msg hidden">
      &#10003; Thank you! Your feedback has been submitted.
    </div>

    <form id="feedback-form">
      <label for="student_name" class="required">Your Name</label>
      <input type="text" id="student_name" name="student_name" placeholder="Enter your name" required>

      <label for="student_id" class="required">Student ID</label>
      <input type="number" id="student_id" name="student_id" placeholder="Discord user ID" required>

      <label>Rating</label>
      <div class="star-rating">
        <input type="radio" name="rating" id="star5" value="5">
        <label for="star5" title="5 stars">&#9733;</label>
        <input type="radio" name="rating" id="star4" value="4">
        <label for="star4" title="4 stars">&#9733;</label>
        <input type="radio" name="rating" id="star3" value="3">
        <label for="star3" title="3 stars">&#9733;</label>
        <input type="radio" name="rating" id="star2" value="2">
        <label for="star2" title="2 stars">&#9733;</label>
        <input type="radio" name="rating" id="star1" value="1">
        <label for="star1" title="1 star">&#9733;</label>
      </div>

      <label for="comments">Comments</label>
      <textarea id="comments" name="comments" placeholder="What did you think of the tour? Any suggestions?"></textarea>

      <button type="submit" class="btn">Submit Feedback</button>
    </form>

    <div class="feedback-footer">
      Bridge 2026 VII &middot; Industry Tour Feedback
    </div>
  </div>

  <script>
    document.getElementById('feedback-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form = e.target;
      const data = {
        tour_id: {{ tour.id }},
        student_name: form.student_name.value.trim(),
        student_id: parseInt(form.student_id.value, 10),
        rating: parseInt(document.querySelector('input[name="rating"]:checked')?.value || '0', 10) || null,
        comments: form.comments.value.trim() || null,
      };

      try {
        const res = await fetch('/api/feedback/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await res.json();

        if (res.ok && json.success) {
          document.getElementById('success-msg').classList.remove('hidden');
          form.classList.add('hidden');
        } else {
          alert(json.error || 'Failed to submit feedback');
        }
      } catch (err) {
        alert('Network error. Please try again.');
      }
    });
  </script>
</body>
</html>
